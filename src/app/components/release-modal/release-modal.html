@if (store.releaseModalOpen()) {
  <div class="overlay" (click)="store.closeReleaseModal()">
    <div class="modal" (click)="stopPropagation($event)">
      <div class="modal-header">
        <div class="title">{{ 'release.title' | transloco }}</div>
        <div class="spacer"></div>
        <button type="button" class="close-btn" [attr.aria-label]="'common.close' | transloco" (click)="store.closeReleaseModal()">×</button>
      </div>
      <div class="hint">{{ 'release.hint' | transloco }}</div>

      <label class="field-label" for="release-version">{{ 'release.versionLabel' | transloco }}</label>
      <input
        id="release-version"
        [value]="store.releaseForm().version"
        (input)="store.updateReleaseVersion($any($event.target).value)"
        placeholder="v1.4.0"
        class="text-input"
      />

      <label class="field-label" for="release-next-sprint">{{ 'release.nextSprintLabel' | transloco }}</label>
      <input
        id="release-next-sprint"
        [value]="store.releaseForm().nextSprint"
        (input)="store.updateReleaseNextSprint($any($event.target).value)"
        placeholder="Sprint 5"
        class="text-input"
      />

      <div class="actions">
        <button type="button" class="cancel-btn" (click)="store.closeReleaseModal()">{{ 'common.cancel' | transloco }}</button>
        <button type="button" class="submit-btn" [disabled]="!store.releaseCanSubmit()" (click)="store.confirmRelease()">
          {{ 'release.publish' | transloco }}
        </button>
      </div>
    </div>
  </div>
}
