<div class="section-title">{{ 'detail.comments' | transloco }}</div>
<div class="comments">
  @for (c of ticket().comments; track $index; let i = $index) {
  <div class="comment">
    <div class="comment-header">
      <div class="comment-author">{{ c.author }}</div>
      <div class="comment-time">{{ formatDateTime(c.createdAt) }}</div>
      @if (store.canEditComment(c)) {
      <button type="button" class="bug-link-remove comment-remove" [attr.aria-label]="'detail.editComment' | transloco"
        (click)="startEditComment(i, c.text)">✎</button>
      }
      @if (store.isAdmin()) {
      <button type="button" class="bug-link-remove comment-remove"
        [attr.aria-label]="'detail.removeComment' | transloco" (click)="removeComment(i)">×</button>
      }
    </div>
    @if (editingCommentIndex() === i) {
    <div class="comment-form">
      <input [value]="editCommentDraft()" (input)="editCommentDraft.set($any($event.target).value)"
        (keydown.enter)="saveEditComment(i)" [attr.aria-label]="'detail.editComment' | transloco"
        class="comment-input" />
      <button type="button" class="comment-submit" (click)="saveEditComment(i)">{{ 'common.save' | transloco }}</button>
      <button type="button" class="link-btn" (click)="cancelEditComment()">{{ 'common.cancel' | transloco }}</button>
    </div>
    } @else {
    <div class="comment-text">{{ c.text }}</div>
    }
  </div>
  }
</div>
<div class="comment-form">
  <input [value]="newCommentText()" (input)="newCommentText.set($any($event.target).value)"
    (keydown.enter)="submitComment()" [placeholder]="'detail.commentPlaceholder' | transloco"
    [attr.aria-label]="'detail.commentPlaceholder' | transloco" class="comment-input" />
  <button type="button" class="comment-submit" (click)="submitComment()">{{ 'detail.send' | transloco }}</button>
</div>
