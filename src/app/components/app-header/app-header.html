<div class="header">
  <div class="logo">
    <span>🎫</span><span>{{ 'header.appName' | transloco }}</span>
  </div>

  <div class="project-switcher">
    <button type="button" class="project-trigger" (click)="toggleProjectMenu()">
      <span class="project-trigger-label">{{ currentProjectLabel() }}</span>
      <span class="project-trigger-chevron" [class.project-trigger-chevron-open]="projectMenuOpen()">▾</span>
    </button>

    @if (projectMenuOpen()) {
      <div class="project-menu-backdrop" (click)="closeProjectMenu()"></div>
      <div class="project-menu" (click)="stopPropagation($event)">
        @for (proj of store.projects; track proj.id) {
          <a
            class="project-menu-item"
            [class.project-menu-item-active]="store.project() === proj.id"
            [routerLink]="['/', proj.id]"
            (click)="closeProjectMenu()"
          >{{ proj.label }}</a>
        }
      </div>
    }
  </div>

  <app-language-switcher />

  <button
    type="button"
    class="theme-toggle"
    [attr.aria-label]="(store.dark() ? 'theme.enableLight' : 'theme.enableDark') | transloco"
    (click)="store.toggleDark()"
  >{{ store.dark() ? '🌙' : '☀️' }}</button>

  <button type="button" class="new-ticket" (click)="store.openNewTicket()">{{ 'header.newTicket' | transloco }}</button>

  @if (isRealUser()) {
    <button
      type="button"
      class="avatar"
      [attr.title]="'header.signOut' | transloco"
      [attr.aria-label]="'header.signOut' | transloco"
      (click)="logout()"
    >{{ initials() }}</button>
  } @else {
    <button type="button" class="sign-in" (click)="openLogin()">{{ 'header.signIn' | transloco }}</button>
  }
</div>
