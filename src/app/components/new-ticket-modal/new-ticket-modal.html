@if (store.newTicketOpen()) {
  <div class="overlay" (click)="close()">
    <div class="modal" (click)="stopPropagation($event)">
      <div class="modal-header">
        <div class="title">{{ 'newTicket.title' | transloco }}</div>
        <div class="spacer"></div>
        <button type="button" class="close-btn" [attr.aria-label]="'common.close' | transloco" (click)="close()">×</button>
      </div>

      <label class="field-label" for="new-ticket-title">{{ 'newTicket.fieldTitle' | transloco }}</label>
      <input
        id="new-ticket-title"
        [formField]="ticketForm.title"
        [placeholder]="'newTicket.titlePlaceholder' | transloco"
        class="text-input"
      />

      <label class="field-label" for="new-ticket-description">{{ 'newTicket.description' | transloco }}</label>
      <textarea
        id="new-ticket-description"
        [formField]="ticketForm.description"
        [placeholder]="'newTicket.descriptionPlaceholder' | transloco"
        class="text-area"
      ></textarea>

      <div class="row-fields">
        <div class="field-group">
          <div class="field-label">{{ 'newTicket.category' | transloco }}</div>
          <div class="pills">
            @for (c of categoryOptions; track c) {
              <button
                type="button"
                class="category-pill"
                [class.category-pill-active]="category() === c"
                [attr.aria-label]="categoryMeta(c).labelKey | transloco"
                [attr.data-tooltip]="categoryMeta(c).labelKey | transloco"
                (click)="setCategory(c)"
              >{{ categoryMeta(c).emoji }}<span class="category-label">{{ categoryMeta(c).labelKey | transloco }}</span></button>
            }
          </div>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="cancel-btn" (click)="close()">{{ 'common.cancel' | transloco }}</button>
        <button type="button" class="submit-btn" [disabled]="!canSubmit()" (click)="submit()">{{ 'newTicket.submit' | transloco }}</button>
      </div>
    </div>
  </div>
}
