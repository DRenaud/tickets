<div class="tabs" role="tablist">
  @for (tab of tabs; track tab.key) {
    <a
      role="tab"
      class="tab"
      routerLinkActive="tab-active"
      #rla="routerLinkActive"
      [attr.aria-selected]="rla.isActive"
      [routerLink]="[tab.key]"
    >{{ tab.labelKey | transloco }}</a>
  }
</div>
